# SonarCloud project identity for CI-based analysis.
sonar.projectKey=oboapp_oboapp
sonar.organization=oboapp
sonar.host.url=https://sonarcloud.io

# Analyze application code across all workspace packages.
sonar.sources=api/src,db/src,ingest,shared/src,web

# Classify tests explicitly so they are not tracked as source-code issues.
sonar.tests=api/src,db/src,ingest,shared/src,web
sonar.test.inclusions=**/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/*.spec.tsx,**/*.integration.test.ts,**/__tests__/**

# Exclude tests/mocks/build artifacts from issue tracking.
sonar.exclusions=**/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/*.spec.tsx,**/*.integration.test.ts,**/__tests__/**,**/__mocks__/**,**/coverage/**,**/dist/**,**/.next/**,**/node_modules/**,db/migrate/**,tmp/**

# Exclude tests and migrations from duplication checks as well.
sonar.cpd.exclusions=**/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/*.spec.tsx,**/*.integration.test.ts,**/__tests__/**,**/__mocks__/**,db/migrate/**

# Import LCOV reports generated by the root test:coverage:sonar script.
sonar.javascript.lcov.reportPaths=api/coverage/lcov.info,db/coverage/lcov.info,ingest/coverage/lcov.info,shared/coverage/lcov.info,web/coverage/lcov.info
sonar.typescript.lcov.reportPaths=api/coverage/lcov.info,db/coverage/lcov.info,ingest/coverage/lcov.info,shared/coverage/lcov.info,web/coverage/lcov.info