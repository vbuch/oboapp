address-hints: >-
  Streets use ул. (улица, street) and бул. (булевард, boulevard) prefixes.
  Quarters are кв. or ж.к. (жилищен комплекс, housing complex).
  Housing complex addresses follow "бл. {block number}, ж.к. {complex name}" format.
  Cadastral identifiers use the format XXXXX.XXXX.XXXX; the Sofia municipality prefix is 68134.
  Bus, tram, and trolleybus stops are referenced as "спирка {code or name}".
