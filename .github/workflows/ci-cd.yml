name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: # Allow manual trigger

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
  ALERT_EMAIL: ${{ secrets.ALERT_EMAIL }}
  LOCALITY: ${{ secrets.LOCALITY }}
  GCS_GENERIC_BUCKET: ${{ vars.GCS_GENERIC_BUCKET || '' }}
  REGION: europe-west1
  IMAGE_NAME: oborishte-ingest

jobs:
  dependency-check:
    name: Dependency Check
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "pnpm"

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Check circular dependencies
        run: pnpm dlx dpdm@3.14.0 --no-tree --no-warning --exit-code circular:1 "db/src/**/*.ts" "shared/src/**/*.ts" "ingest/**/*.ts" "web/**/*.{ts,tsx}"

      - name: Install APM CLI
        uses: microsoft/apm-action@v1

      - name: Check APM install drift
        run: |
          apm install --force
          DRIFT=$(git status --porcelain -- apm.lock.yaml .github/agents/ .github/instructions/ .github/prompts/ .github/skills/ .claude/agents/ .claude/commands/ .claude/rules/ .claude/skills/)
          if [ -n "$DRIFT" ]; then
            echo "APM-managed files are out of date. Run 'pnpm apm:install' locally and commit the result."
            echo "$DRIFT"
            exit 1
          fi

      - name: Check for orphaned APM-deployed files
        run: |
          STATUS=0
          LOCKFILE=apm.lock.yaml

          if [ ! -f "$LOCKFILE" ]; then
            echo "::error::Missing $LOCKFILE. Run 'pnpm apm:install' and commit generated files."
            exit 1
          fi

          # Use APM-generated deployment outputs as source of truth.
          EXPECTED_DEPLOYED=$(awk '
            /^[[:space:]]*deployed_files:[[:space:]]*$/ { in_list=1; next }
            in_list && /^[[:space:]]*-[[:space:]]+/ { sub(/^[[:space:]]*-[[:space:]]+/, ""); print; next }
            in_list && !/^[[:space:]]*-[[:space:]]+/ { in_list=0 }
          ' "$LOCKFILE")

          if [ -z "$EXPECTED_DEPLOYED" ]; then
            echo "::error::No deployed_files entries found in $LOCKFILE."
            exit 1
          fi

          EXISTING_DEPLOYED=""

          for dir in .github/agents .github/instructions .github/prompts .claude/agents .claude/commands .claude/rules; do
            [ -d "$dir" ] || continue
            for f in "$dir"/*.md; do
              [ -f "$f" ] || continue
              EXISTING_DEPLOYED="${EXISTING_DEPLOYED:+$EXISTING_DEPLOYED$'\n'}$f"
            done
          done

          for dir in .github/skills .claude/skills; do
            [ -d "$dir" ] || continue
            for d in "$dir"/*/; do
              [ -d "$d" ] || continue
              name="$(basename "$d")"
              path="$dir/$name"
              EXISTING_DEPLOYED="${EXISTING_DEPLOYED:+$EXISTING_DEPLOYED$'\n'}$path"
            done
          done

          while IFS= read -r path; do
            [ -n "$path" ] || continue
            if ! echo "$EXPECTED_DEPLOYED" | grep -Fxq "$path"; then
              echo "::error::Orphaned APM-deployed path: $path (not present in $LOCKFILE deployed_files)"
              STATUS=1
            fi
          done <<< "$EXISTING_DEPLOYED"

          if [ "$STATUS" -ne 0 ]; then
            echo ""
            echo "Orphaned APM-deployed paths found in .github/ or .claude/."
            echo "Delete the orphaned paths or run 'pnpm apm:install' and commit updated lockfile + outputs."
            exit 1
          fi
          echo "No orphaned APM files found."

  test-ingest:
    name: Test Ingest
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "pnpm"

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Run unit tests
        working-directory: ./ingest
        run: pnpm test:run

  test-web:
    name: Test Web
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "pnpm"

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Run unit tests
        working-directory: ./web
        run: pnpm test:run

  build-web:
    name: Build Web
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "pnpm"

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared package
        working-directory: ./shared
        run: pnpm build

      - name: Next.js build
        working-directory: ./web
        env:
          NEXT_PUBLIC_LOCALITY: ${{ secrets.LOCALITY || 'bg.sofia' }}
          USE_FIREBASE_EMULATORS: "true"
          NEXT_PUBLIC_USE_FIREBASE_EMULATORS: "true"
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: "demo-project"
          # Sentry — all optional; omit secrets to disable Sentry for self-hosters
          NEXT_PUBLIC_SENTRY_DSN: ${{ secrets.NEXT_PUBLIC_SENTRY_DSN }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
        run: pnpm build

  build-and-deploy:
    name: Build and Deploy to GCP
    runs-on: ubuntu-latest
    needs: [dependency-check, test-ingest, test-web, build-web]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    permissions:
      contents: read
      id-token: write # Required for Workload Identity Federation

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker europe-west1-docker.pkg.dev

      - name: Build and push Docker image
        id: build
        run: |
          set -e  # Exit on error
          IMAGE_TAG="latest"
          REGISTRY_URL="europe-west1-docker.pkg.dev/$PROJECT_ID/oborishte-ingest"

          # Build and push with latest tag
          echo "========================================="
          echo "Building image for commit: $GITHUB_SHA"
          echo "Image tag: $IMAGE_TAG"
          echo "Full image: $REGISTRY_URL/$IMAGE_NAME:$IMAGE_TAG"
          echo "========================================="

          # Create inline cloudbuild config
          cat > /tmp/cloudbuild.yaml << 'EOF'
          steps:
            - name: 'gcr.io/cloud-builders/docker'
              args: 
                - 'build'
                - '-f'
                - 'ingest/Dockerfile'
                - '-t'
                - '$_REGISTRY_URL/$_IMAGE_NAME:$_IMAGE_TAG'
                - '.'
            - name: 'gcr.io/cloud-builders/docker'
              args: 
                - 'push'
                - '$_REGISTRY_URL/$_IMAGE_NAME:$_IMAGE_TAG'
          images:
            - '$_REGISTRY_URL/$_IMAGE_NAME:$_IMAGE_TAG'
          EOF

          # Submit build from repo root with ingest/Dockerfile
          gcloud builds submit \
            --config=/tmp/cloudbuild.yaml \
            --substitutions=_IMAGE_TAG=$IMAGE_TAG,_REGISTRY_URL=$REGISTRY_URL,_IMAGE_NAME=$IMAGE_NAME \
            .

          echo "========================================="
          echo "✅ Image built and tagged as $IMAGE_TAG"
          echo "========================================="

          echo "IMAGE_TAG=$IMAGE_TAG" >> $GITHUB_ENV
          echo "image_tag=$IMAGE_TAG" >> $GITHUB_OUTPUT

          # Wait for registry to fully propagate
          echo "Waiting for registry to propagate..."
          sleep 10

          echo "✅ Build completed successfully"

      - name: Grant Artifact Registry access to Cloud Run service account
        run: |
          # Ensure the Cloud Run service account can pull images from Artifact Registry
          echo "Granting Artifact Registry access to ingest-runner service account..."
          gcloud projects add-iam-policy-binding $PROJECT_ID \
            --member="serviceAccount:ingest-runner@$PROJECT_ID.iam.gserviceaccount.com" \
            --role="roles/artifactregistry.reader" \
            --quiet || echo "Permission may already exist"

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.6.0

      - name: Terraform Init
        run: |
          cd ingest/terraform
          terraform init

      - name: Terraform Plan
        run: |
          cd ingest/terraform

          # Debug: Show what IMAGE_TAG we're using
          echo "Using IMAGE_TAG: ${IMAGE_TAG}"
          echo "Using image: europe-west1-docker.pkg.dev/$PROJECT_ID/oborishte-ingest/$IMAGE_NAME:${IMAGE_TAG}"

          terraform plan \
            -var="project_id=$PROJECT_ID" \
            -var="region=$REGION" \
            -var="image_tag=${IMAGE_TAG}" \
            -var="firebase_project_id=$FIREBASE_PROJECT_ID" \
            -var="alert_email=$ALERT_EMAIL" \
            -var="locality=$LOCALITY" \
            -var="ci_service_account_email=${{ secrets.GCP_SERVICE_ACCOUNT }}" \
            -var="gcs_generic_bucket=$GCS_GENERIC_BUCKET" \
            -out=tfplan

      - name: Terraform Apply
        run: |
          cd ingest/terraform
          terraform apply -auto-approve tfplan

      - name: Output deployment info
        run: |
          echo "✅ Deployment successful!"
          echo "Image: europe-west1-docker.pkg.dev/$PROJECT_ID/oborishte-ingest/$IMAGE_NAME:latest"
          echo "Region: $REGION"
          echo "Commit: $GITHUB_SHA"
